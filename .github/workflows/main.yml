name: Daily cybernetic scan

on:
  schedule:
    - cron: "0 7 * * *"   # 07:00 UTC daily (GitHub may delay by a few minutes)
  workflow_dispatch:        # lets you trigger a run manually from the Actions tab

permissions:
  contents: write           # needed to commit the digest back to the repo

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install -r requirements.txt

      - name: Run scan
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python cyber_scan.py

      - name: Commit digest
        run: |
          git config user.name "cyber-scan-bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add digests/
          git diff --staged --quiet || git commit -m "scan: $(date -u +%F)"
          git push
